name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
        shell: bash
      - name: Typecheck
        run: npx tsc --noEmit
        shell: bash
      - name: Build Webview
        run: npx vite build
        shell: bash
      - name: Pillar 1 & 2 - Pure Logic & React Components (Vitest)
        run: npm run test
        shell: bash
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-coreason-vscode
          fail_ci_if_error: false
